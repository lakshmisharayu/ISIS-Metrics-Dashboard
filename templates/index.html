<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISIS Metrics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root {
            --primary-color: #0d6efd;
            --success-color: #198754;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .dashboard-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        .metric-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .metric-value {
            font-size: 36px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        
        .metric-small {
            font-size: 24px;
        }
        
        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }
        
        .device-selector {
            margin-bottom: 30px;
        }
        
        .device-selector select {
            border-radius: 8px;
            border: 2px solid #667eea;
            padding: 10px 15px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .device-selector select:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .refresh-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease;
        }
        
        .refresh-button:hover {
            color: white;
            transform: scale(1.05);
        }
        
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner.active {
            display: block;
        }
        
        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">ISIS Metrics Dashboard</a>
            <div class="navbar-text">
                <small>Real-time ISIS Routing Protocol Metrics</small>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="dashboard-container">
            <div class="row device-selector">
                <div class="col-md-6">
                    <label for="deviceSelect" class="form-label fw-bold">Select Device:</label>
                    <select id="deviceSelect" class="form-select" onchange="changeDevice()">
                        <option value="">Loading devices...</option>
                    </select>
                </div>
                <div class="col-md-6 d-flex align-items-end">
                    <button class="refresh-button" onclick="refreshMetrics()">Refresh Metrics</button>
                </div>
            </div>

            <div id="loadingSpinner" class="loading-spinner">
                <div class="spinner-border" role="status"></div>
                <p>Loading metrics...</p>
            </div>

            <div id="metricsContent" style="display:none;">
                <div class="row">
                    <div class="col-md-6 col-lg-4">
                        <div class="metric-card">
                            <div class="metric-label">Total LSPs</div>
                            <div class="metric-value" id="totalLsps">-</div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-4">
                        <div class="metric-card">
                            <div class="metric-label">ISIS Nodes</div>
                            <div class="metric-value" id="isisNodes">-</div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-4">
                        <div class="metric-card">
                            <div class="metric-label">L1/L2 Split</div>
                            <div class="metric-value metric-small" id="l1l2Split">-/-</div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-4">
                        <div class="metric-card">
                            <div class="metric-label">LSP Database Size</div>
                            <div class="metric-value metric-small" id="lspDbSize">-</div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-4">
                        <div class="metric-card">
                            <div class="metric-label">Adjacencies</div>
                            <div class="metric-value metric-small" id="adjacencies">-</div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-4">
                        <div class="metric-card">
                            <div class="metric-label">ISIS Interfaces</div>
                            <div class="metric-value metric-small" id="interfaces">-</div>
                        </div>
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-lg-6">
                        <div class="chart-container">
                            <div class="chart-title">Total LSPs Trend</div>
                            <div id="lspChart"></div>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="chart-container">
                            <div class="chart-title">ISIS Nodes Trend</div>
                            <div id="nodesChart"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>ISIS Metrics Dashboard v1.0.0 | Last Updated: <span id="lastUpdate">-</span></p>
    </div>

    <script>
        let currentDevice = '';

        document.addEventListener('DOMContentLoaded', function() {
            loadDevices();
            setInterval(refreshMetrics, 30000);
        });

        function loadDevices() {
            fetch('/api/devices')
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('deviceSelect');
                    select.innerHTML = '';
                    
                    if (data.devices && data.devices.length > 0) {
                        data.devices.forEach(device => {
                            const option = document.createElement('option');
                            option.value = device;
                            option.textContent = device;
                            select.appendChild(option);
                        });
                        currentDevice = data.devices[0];
                        select.value = currentDevice;
                        refreshMetrics();
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        function changeDevice() {
            currentDevice = document.getElementById('deviceSelect').value;
            refreshMetrics();
        }

        function refreshMetrics() {
            if (!currentDevice) return;

            document.getElementById('loadingSpinner').classList.add('active');
            
            fetch(`/api/metrics?device=${currentDevice}`)
                .then(response => response.json())
                .then(data => updateDashboard(data))
                .finally(() => {
                    document.getElementById('loadingSpinner').classList.remove('active');
                    document.getElementById('metricsContent').style.display = 'block';
                    updateTimestamp();
                });
        }

        function updateDashboard(data) {
            document.getElementById('totalLsps').textContent = data.total_lsps || '-';
            document.getElementById('isisNodes').textContent = data.isis_nodes || '-';
            document.getElementById('l1l2Split').textContent = 
                (data.lsp_count_l1 || 0) + '/' + (data.lsp_count_l2 || 0);
            document.getElementById('lspDbSize').textContent = 
                formatBytes(data.lsp_database_size || 0);
            document.getElementById('adjacencies').textContent = data.adjacencies || '-';
            document.getElementById('interfaces').textContent = data.interfaces || '-';
        }

        function updateTimestamp() {
            const now = new Date().toLocaleString();
            document.getElementById('lastUpdate').textContent = now;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
    </script>
</body>
</html>
